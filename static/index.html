<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuLog · 实物金倒T账本</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <div>
        <h1>AuLog</h1>
        <p class="subtitle">实物金倒 T 账本</p>
      </div>
      <div id="user-bar" class="user-bar hidden">
        <span id="current-username"></span>
        <button type="button" class="btn-sm" id="btn-logout">退出</button>
      </div>
    </div>
  </header>

  <div id="auth-screen" class="auth-screen">
    <div class="card auth-card">
      <h2 id="auth-title">登录</h2>
      <div class="auth-tabs">
        <button type="button" class="auth-tab active" data-mode="login">登录</button>
        <button type="button" class="auth-tab" data-mode="register">注册</button>
      </div>
      <form id="form-auth" class="auth-form">
        <label><span class="label-text">用户名</span><input name="username" required minlength="3" maxlength="32" autocomplete="username" /></label>
        <label><span class="label-text">密码</span><input name="password" type="password" required minlength="6" autocomplete="current-password" /></label>
        <button type="submit" id="auth-submit">登录</button>
      </form>
    </div>
  </div>

  <div id="app-shell" class="hidden">
  <nav class="tabs">
    <button class="tab active" data-tab="t">倒 T</button>
    <button class="tab" data-tab="ing">进货 ing</button>
    <button class="tab" data-tab="selled">反弹 selled</button>
    <button class="tab" data-tab="alloc">分配记录</button>
  </nav>

  <main class="container">
    <!-- 倒 T -->
    <section id="panel-t" class="panel active">
      <form id="form-t" class="card form-grid">
        <div class="form-header">
          <h2>新建卖出记录</h2>
        </div>
        <label><span class="label-text">备注 mark</span><input name="mark" placeholder="卖了什么" /></label>
        <label><span class="label-text">克数 count</span><input name="count" type="number" step="0.01" min="0.01" required /></label>
        <label><span class="label-text">回笼金额 pop_amount</span><input name="pop_amount" type="number" step="0.01" min="0.01" required /></label>
        <label><span class="label-text">卖出日期</span>
          <div class="date-picker">
            <input type="hidden" name="sold_at" />
            <button type="button" class="date-picker-btn"><span class="date-picker-text">选择日期</span></button>
          </div>
        </label>
        <button type="submit">添加</button>
      </form>
      <div class="card">
        <h2>倒 T 列表</h2>
        <div id="list-t" class="table-wrap"></div>
      </div>
    </section>

    <!-- ing -->
    <section id="panel-ing" class="panel">
      <form id="form-ing" class="card form-grid">
        <div class="form-header">
          <h2>新建进货记录</h2>
        </div>
        <label><span class="label-text">日期 date</span>
          <div class="date-picker" data-required>
            <input type="hidden" name="date" required />
            <button type="button" class="date-picker-btn"><span class="date-picker-text">选择日期</span></button>
          </div>
        </label>
        <label><span class="label-text">备注 mark</span><input name="mark" placeholder="买了什么" /></label>
        <label><span class="label-text">单价 price</span><input name="price" type="number" step="0.01" min="0.01" required /></label>
        <label><span class="label-text">克数 count</span><input name="count" type="number" step="0.01" min="0.01" required /></label>
        <label><span class="label-text">总价 amount</span><input name="amount" type="number" step="0.01" placeholder="留空自动计算" /></label>
        <button type="submit">添加</button>
      </form>
      <div class="card">
        <h2>进货列表</h2>
        <div id="list-ing" class="table-wrap"></div>
      </div>
    </section>

    <!-- selled -->
    <section id="panel-selled" class="panel">
      <div class="card">
        <p class="hint">反弹卖出只能从「进货 ing」列表中操作「反弹卖出」创建，并自动关联对应进货记录。</p>
      </div>
      <div class="card">
        <h2>反弹卖出列表</h2>
        <div id="list-selled" class="table-wrap"></div>
      </div>
    </section>

    <!-- allocations -->
    <section id="panel-alloc" class="panel">
      <div class="card">
        <h2>分配记录</h2>
        <p class="hint">ing 克数分配到倒 T 配对，或反弹卖出。</p>
        <div id="list-alloc" class="table-wrap"></div>
      </div>
    </section>
  </main>
  </div>

  <!-- 配对倒 T 弹窗 -->
  <dialog id="dialog-t-match">
    <form method="dialog" id="form-t-match" class="dialog-form">
      <h3>配对倒 T</h3>
      <p id="t-match-ing-info" class="dialog-info"></p>
      <label>选择倒 T 记录
        <select name="t_id" required></select>
      </label>
      <label>配对克数<input name="count" type="number" step="0.01" min="0.01" required /></label>
      <div class="dialog-actions">
        <button type="button" class="btn-secondary" id="cancel-t-match">取消</button>
        <button type="submit" value="confirm">确认配对</button>
      </div>
    </form>
  </dialog>

  <!-- 反弹卖出弹窗 -->
  <dialog id="dialog-selled">
    <form method="dialog" id="form-selled-alloc" class="dialog-form">
      <h3>反弹卖出</h3>
      <p id="selled-ing-info" class="dialog-info"></p>
      <label>日期
        <div class="date-picker" data-required>
          <input type="hidden" name="date" required />
          <button type="button" class="date-picker-btn"><span class="date-picker-text">选择日期</span></button>
        </div>
      </label>
      <label>备注 mark<input name="mark" /></label>
      <label>卖出克数<input name="count" type="number" step="0.01" min="0.01" required /></label>
      <label>卖出单价<input name="sell_price" type="number" step="0.01" min="0.01" required /></label>
      <div class="dialog-actions">
        <button type="button" class="btn-secondary" id="cancel-selled">取消</button>
        <button type="submit" value="confirm">确认卖出</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast hidden"></div>
  <script src="/static/datepicker.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
