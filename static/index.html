<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuLog · 实物金倒T账本</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <header class="header">
    <div class="header-inner">
      <h1>AuLog</h1>
      <p class="subtitle">实物金倒 T 账本 · 最简版</p>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="t">倒 T</button>
    <button class="tab" data-tab="ing">进货 ing</button>
    <button class="tab" data-tab="selled">反弹 selled</button>
    <button class="tab" data-tab="alloc">分配记录</button>
  </nav>

  <main class="container">
    <!-- 倒 T -->
    <section id="panel-t" class="panel active">
      <form id="form-t" class="card form-grid">
        <h2>新建卖出记录</h2>
        <label>备注 mark<input name="mark" placeholder="卖了什么" /></label>
        <label>克数 count<input name="count" type="number" step="0.01" min="0.01" required /></label>
        <label>回笼金额 pop_amount<input name="pop_amount" type="number" step="0.01" min="0.01" required /></label>
        <label>卖出日期<input name="sold_at" placeholder="如 0622" /></label>
        <button type="submit">添加</button>
      </form>
      <div class="card">
        <h2>倒 T 列表</h2>
        <div id="list-t" class="table-wrap"></div>
      </div>
    </section>

    <!-- ing -->
    <section id="panel-ing" class="panel">
      <form id="form-ing" class="card form-grid">
        <h2>新建进货记录</h2>
        <label>日期 date<input name="date" placeholder="如 0622" required /></label>
        <label>备注 mark<input name="mark" placeholder="买了什么" /></label>
        <label>单价 price<input name="price" type="number" step="0.01" min="0.01" required /></label>
        <label>克数 count<input name="count" type="number" step="0.01" min="0.01" required /></label>
        <label>总价 amount <span class="hint">（留空自动计算）</span><input name="amount" type="number" step="0.01" /></label>
        <button type="submit">添加</button>
      </form>
      <div class="card">
        <h2>进货列表</h2>
        <div id="list-ing" class="table-wrap"></div>
      </div>
    </section>

    <!-- selled -->
    <section id="panel-selled" class="panel">
      <form id="form-selled" class="card form-grid">
        <h2>手动新建反弹卖出</h2>
        <p class="hint">通常通过 ing 列表「反弹卖出」创建；此处供手动补录。</p>
        <label>日期<input name="date" required placeholder="如 0616" /></label>
        <label>备注 mark<input name="mark" /></label>
        <label>买入单价 buy<input name="buy_price" type="number" step="0.01" min="0.01" required /></label>
        <label>克数 count<input name="count" type="number" step="0.01" min="0.01" required /></label>
        <label>卖出单价 sell<input name="sell_price" type="number" step="0.01" min="0.01" required /></label>
        <button type="submit">添加</button>
      </form>
      <div class="card">
        <h2>反弹卖出列表</h2>
        <div id="list-selled" class="table-wrap"></div>
      </div>
    </section>

    <!-- allocations -->
    <section id="panel-alloc" class="panel">
      <div class="card">
        <h2>分配记录</h2>
        <p class="hint">ing 克数分配到倒 T 配对，或反弹卖出。</p>
        <div id="list-alloc" class="table-wrap"></div>
      </div>
    </section>
  </main>

  <!-- 配对倒 T 弹窗 -->
  <dialog id="dialog-t-match">
    <form method="dialog" id="form-t-match" class="dialog-form">
      <h3>配对倒 T</h3>
      <p id="t-match-ing-info" class="dialog-info"></p>
      <label>选择倒 T 记录
        <select name="t_id" required></select>
      </label>
      <label>配对克数<input name="count" type="number" step="0.01" min="0.01" required /></label>
      <div class="dialog-actions">
        <button type="button" class="btn-secondary" id="cancel-t-match">取消</button>
        <button type="submit" value="confirm">确认配对</button>
      </div>
    </form>
  </dialog>

  <!-- 反弹卖出弹窗 -->
  <dialog id="dialog-selled">
    <form method="dialog" id="form-selled-alloc" class="dialog-form">
      <h3>反弹卖出</h3>
      <p id="selled-ing-info" class="dialog-info"></p>
      <label>日期<input name="date" required placeholder="如 0616" /></label>
      <label>备注 mark<input name="mark" /></label>
      <label>卖出克数<input name="count" type="number" step="0.01" min="0.01" required /></label>
      <label>卖出单价<input name="sell_price" type="number" step="0.01" min="0.01" required /></label>
      <div class="dialog-actions">
        <button type="button" class="btn-secondary" id="cancel-selled">取消</button>
        <button type="submit" value="confirm">确认卖出</button>
      </div>
    </form>
  </dialog>

  <div id="toast" class="toast hidden"></div>
  <script src="/static/app.js"></script>
</body>
</html>
